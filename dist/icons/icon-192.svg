<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- 背景：深宇宙 -->
  <rect width="192" height="192" rx="28" fill="#0a0a1e"/>

  <!-- 星々 -->
  <circle cx="20"  cy="18"  r="1.5" fill="white" opacity="0.8"/>
  <circle cx="45"  cy="8"   r="1"   fill="white" opacity="0.6"/>
  <circle cx="80"  cy="14"  r="2"   fill="white" opacity="0.9"/>
  <circle cx="120" cy="6"   r="1.5" fill="white" opacity="0.7"/>
  <circle cx="160" cy="20"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="175" cy="10"  r="2"   fill="white" opacity="0.8"/>
  <circle cx="10"  cy="60"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="178" cy="55"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="30"  cy="170" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="155" cy="175" r="1"   fill="white" opacity="0.7"/>
  <circle cx="170" cy="160" r="2"   fill="white" opacity="0.6"/>

  <!-- ネオングロー（地球の後光） -->
  <circle cx="96" cy="100" r="58" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.3"/>
  <circle cx="96" cy="100" r="52" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.2"/>

  <!-- 地球本体 -->
  <circle cx="96" cy="100" r="46" fill="#1a6fbf"/>

  <!-- 大陸（シンプルな形） -->
  <ellipse cx="80" cy="88" rx="22" ry="16" fill="#2d9e3e" opacity="0.9"/>
  <ellipse cx="108" cy="100" rx="16" ry="20" fill="#2d9e3e" opacity="0.85"/>
  <ellipse cx="90" cy="118" rx="10" ry="8"  fill="#2d9e3e" opacity="0.8"/>

  <!-- 海の光沢 -->
  <ellipse cx="75" cy="92" rx="6" ry="4" fill="white" opacity="0.12" transform="rotate(-20 75 92)"/>

  <!-- ネオン枠線 -->
  <circle cx="96" cy="100" r="46" fill="none" stroke="#4dd0e1" stroke-width="1.5" opacity="0.6"/>

  <!-- タイトルテキスト -->
  <text x="96" y="168" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="14" font-weight="900" letter-spacing="1" fill="#00f5ff">
    TAPOCALYPSE
  </text>

  <!-- テキストグロー効果（影） -->
  <text x="96" y="168" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="14" font-weight="900" letter-spacing="1" fill="#00f5ff" opacity="0.3"
        filter="url(#glow)">
    TAPOCALYPSE
  </text>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
    </filter>
  </defs>
</svg>
