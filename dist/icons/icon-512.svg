<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景：深宇宙 -->
  <rect width="512" height="512" rx="72" fill="#0a0a1e"/>

  <!-- 星々 -->
  <circle cx="50"  cy="45"  r="3"   fill="white" opacity="0.8"/>
  <circle cx="120" cy="20"  r="2"   fill="white" opacity="0.6"/>
  <circle cx="200" cy="35"  r="4"   fill="white" opacity="0.9"/>
  <circle cx="320" cy="15"  r="3"   fill="white" opacity="0.7"/>
  <circle cx="420" cy="50"  r="2"   fill="white" opacity="0.5"/>
  <circle cx="470" cy="25"  r="4"   fill="white" opacity="0.8"/>
  <circle cx="25"  cy="160" r="2"   fill="white" opacity="0.6"/>
  <circle cx="480" cy="150" r="3"   fill="white" opacity="0.7"/>
  <circle cx="80"  cy="450" r="3"   fill="white" opacity="0.5"/>
  <circle cx="420" cy="470" r="2"   fill="white" opacity="0.7"/>
  <circle cx="460" cy="430" r="4"   fill="white" opacity="0.6"/>
  <circle cx="18"  cy="300" r="2"   fill="white" opacity="0.5"/>
  <circle cx="490" cy="310" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="240" cy="22"  r="2"   fill="white" opacity="0.5"/>

  <!-- ネオングロー（地球の後光） -->
  <circle cx="256" cy="265" r="155" fill="none" stroke="#00f5ff" stroke-width="4"  opacity="0.3"/>
  <circle cx="256" cy="265" r="140" fill="none" stroke="#00f5ff" stroke-width="2"  opacity="0.2"/>
  <circle cx="256" cy="265" r="170" fill="none" stroke="#00f5ff" stroke-width="1"  opacity="0.1"/>

  <!-- 地球本体 -->
  <circle cx="256" cy="265" r="125" fill="#1a6fbf"/>

  <!-- 大陸 -->
  <ellipse cx="215" cy="235" rx="58" ry="42" fill="#2d9e3e" opacity="0.9"/>
  <ellipse cx="290" cy="268" rx="44" ry="55" fill="#2d9e3e" opacity="0.85"/>
  <ellipse cx="240" cy="315" rx="28" ry="22" fill="#2d9e3e" opacity="0.8"/>
  <ellipse cx="180" cy="280" rx="18" ry="12" fill="#2d9e3e" opacity="0.75"/>

  <!-- 海の光沢 -->
  <ellipse cx="200" cy="242" rx="16" ry="10" fill="white" opacity="0.12" transform="rotate(-20 200 242)"/>

  <!-- ネオン枠線 -->
  <circle cx="256" cy="265" r="125" fill="none" stroke="#4dd0e1" stroke-width="3" opacity="0.6"/>

  <!-- タイトルテキスト -->
  <text x="256" y="450" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="38" font-weight="900" letter-spacing="3" fill="#00f5ff">
    TAPOCALYPSE
  </text>

  <!-- サブタイトル -->
  <text x="256" y="486" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="20" font-weight="400" letter-spacing="6" fill="#ff00cc" opacity="0.9">
    世界を叩け！
  </text>

  <defs>
    <filter id="glow512" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
    </filter>
  </defs>
</svg>
